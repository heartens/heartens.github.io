<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои ссылки</title>
    <style>
        /* CSS — Оформление страницы */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: white;
        }
        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid white;
            margin-bottom: 15px;
        }
        h1 { font-size: 1.5rem; margin-bottom: 10px; }
        p { margin-bottom: 30px; opacity: 0.9; }
        
        /* Стили кнопок */
        .link {
            display: block;
            background: white;
            color: #764ba2;
            text-decoration: none;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 50px;
            font-weight: bold;
            transition: transform 0.2s, background 0.2s;
        }
        .link:hover {
            transform: scale(1.05);
            background: #f0f0f0;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://via.placeholder.com/100" alt="Профиль" class="profile-img">
        
        <h1>Ваше Имя / Ник</h1>
        <p>Краткое описание (например: Дизайнер / Блогер)</p>

        <a href="https://t.me/ваш_ник" class="link" target="_blank">Telegram</a>
        <a href="https://vk.com/ваш_ник" class="link" target="_blank">ВКонтакте</a>
        <a href="mailto:mail@example.com" class="link">Написать на почту</a>
    </div>

</body>
</html>
